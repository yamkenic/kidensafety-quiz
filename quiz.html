<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>機電安全必携 学習クイズ</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --panel-alt: #f7f9fc;
    --border: #e3e8ef;
    --text: #1f2937;
    --muted: #64748b;
    --primary: #1e6feb;
    --primary-hover: #1856b8;
    --accent: #0ea371;
    --danger: #d92d20;
    --warn: #b54708;
    --shadow: 0 1px 2px rgba(16, 24, 40, 0.05), 0 1px 3px rgba(16, 24, 40, 0.06);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif; line-height: 1.55; }
  a { color: var(--primary); }

  header.app-header {
    background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
  }
  header.app-header h1 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
    color: #0f172a;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header.app-header h1::before {
    content: "";
    width: 6px; height: 22px;
    background: var(--primary);
    border-radius: 3px;
  }
  header.app-header .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
  }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 1.05rem;
    font-weight: 700;
    color: #0f172a;
    border-left: 4px solid var(--primary);
    padding-left: 10px;
  }
  .card h3 {
    margin: 14px 0 8px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #334155;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }
  @media (max-width: 720px) { .filter-grid { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .field select, .field input {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    font-size: 0.95rem;
    color: var(--text);
  }
  .field select:focus, .field input:focus { outline: 2px solid #bfdbfe; border-color: var(--primary); }

  .btn {
    appearance: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    color: var(--text);
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-outline { border-color: var(--border); color: #334155; }
  .btn-outline:hover { background: var(--panel-alt); }
  .btn-ghost { background: transparent; color: var(--primary); }
  .btn-ghost:hover { background: #eff6ff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b42318; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .cat-btn {
    text-align: left;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-alt);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .cat-btn:hover { background: #eef4ff; border-color: #bfdbfe; }
  .cat-btn .cat-name { font-weight: 700; color: #0f172a; display: block; }
  .cat-btn .cat-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  /* Quiz screen */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .progress-wrap { flex: 1; min-width: 200px; }
  .progress-bar {
    height: 8px;
    background: #eef2f7;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #1e6feb, #38bdf8);
    width: 0%;
    transition: width .3s ease;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .score-pill {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: #0f172a;
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .exam-pill {
    background: #0f172a;
    border-color: #0f172a;
    color: #fff;
  }

  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 700;
    border: 1px solid var(--border);
    background: #fff;
    color: #334155;
    letter-spacing: 0.02em;
  }
  .badge.cat { background: #eef4ff; color: #1d4ed8; border-color: #bfdbfe; }
  .badge.page { background: #f1f5f9; color: #475569; }
  .badge.page.reference { background: #f8fafc; color: #64748b; border-color: #cbd5e1; border-style: dashed; }
  .badge.page.clickable {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
  }
  .badge.page.reference.clickable:hover { background: #e2e8f0; color: #334155; }
  .page-link {
    color: #0369a1;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
    cursor: pointer;
    background: none;
    border: 0;
    padding: 0;
    font: inherit;
  }
  .page-link:hover { color: #0c4a6e; }
  .page-ref-reference { color: #64748b; }
  .badge.level-初級 { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
  .badge.level-中級 { background: #fffbeb; color: #92400e; border-color: #fde68a; }
  .badge.level-上級 { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .badge.important { background: var(--danger); color: #fff; border-color: var(--danger); }

  .question {
    font-size: 1.05rem;
    font-weight: 600;
    color: #0f172a;
    margin: 6px 0 16px;
    white-space: pre-wrap;
  }

  .choices { display: grid; gap: 8px; }
  .choice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-size: 0.96rem;
    color: var(--text);
    transition: background .15s, border-color .15s, box-shadow .15s;
  }
  .choice:hover:not(:disabled) { background: var(--panel-alt); border-color: #cbd5e1; }
  .choice .idx {
    width: 24px; height: 24px;
    flex-shrink: 0;
    background: #eef2f7;
    color: #334155;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.82rem;
  }
  .choice.correct {
    background: #ecfdf5;
    border-color: #6ee7b7;
  }
  .choice.correct .idx { background: var(--accent); color: #fff; }
  .choice.wrong {
    background: #fef2f2;
    border-color: #fca5a5;
  }
  .choice.wrong .idx { background: var(--danger); color: #fff; }
  .choice.selected {
    background: #eef4ff;
    border-color: #93c5fd;
  }
  .choice:disabled { cursor: default; }

  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-alt);
    font-size: 0.92rem;
  }
  .feedback.ok { border-color: #6ee7b7; background: #ecfdf5; color: #065f46; }
  .feedback.ng { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
  .feedback .label { font-weight: 700; margin-right: 6px; }
  .feedback .explain { color: #1f2937; margin-top: 6px; }
  .feedback .feedback-source { margin-top: 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .feedback .feedback-source-label { font-weight: 700; }

  .nav-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  /* Result screen */
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 12px;
  }
  @media (max-width: 720px) { .result-grid { grid-template-columns: 1fr; } }
  .stat {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .stat .num { font-size: 1.6rem; font-weight: 700; color: #0f172a; }
  .stat .label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .exam-result {
    margin: 0 0 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-weight: 700;
    border: 1px solid var(--border);
  }
  .exam-result.ok { background: #ecfdf5; color: #065f46; border-color: #6ee7b7; }
  .exam-result.ng { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }

  table.weak {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
    margin-top: 8px;
  }
  table.weak th, table.weak td {
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
  }
  table.weak th { background: var(--panel-alt); color: #334155; font-weight: 700; }
  table.weak td.num { text-align: right; font-variant-numeric: tabular-nums; }

  .review {
    margin-top: 14px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .review-item {
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  .review-item:last-child { border-bottom: none; }
  .review-item .q { font-weight: 600; color: #0f172a; }
  .review-item .meta { font-size: 0.78rem; color: var(--muted); margin: 2px 0 4px; }
  .review-item .a-line { font-size: 0.88rem; }
  .review-item .a-line .ok { color: #047857; font-weight: 700; }
  .review-item .a-line .ng { color: #b91c1c; font-weight: 700; }

  .hint { font-size: 0.8rem; color: var(--muted); }
  .center { text-align: center; }
  .hidden { display: none !important; }

  /* PDF モーダル */
  .pdf-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(15, 23, 42, 0.6);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .pdf-modal__panel {
    background: #fff;
    width: min(1100px, 100%);
    height: min(90vh, 900px);
    border-radius: 10px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  }
  .pdf-modal__head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
  }
  .pdf-modal__title { font-weight: 700; font-size: 0.95rem; color: #0f172a; flex: 1; }
  .pdf-modal__head a { font-size: 0.82rem; color: #0369a1; text-decoration: underline; }
  .pdf-modal__close {
    background: #e2e8f0;
    border: 0;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-weight: 700;
    color: #334155;
  }
  .pdf-modal__close:hover { background: #cbd5e1; }
  .pdf-modal__body { flex: 1; background: #475569; min-height: 0; position: relative; }
  .pdf-modal__body iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  .pdf-source-viewer {
    width: 100%;
    height: 100%;
    overflow: auto;
    padding: 18px;
    background: #475569;
  }
  .pdf-source-page {
    position: relative;
    width: min(820px, 100%);
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 12px 34px rgba(15, 23, 42, 0.35);
  }
  .pdf-source-page img { display: block; width: 100%; height: auto; }
  .source-highlight {
    position: absolute;
    border: 3px solid #e11d48;
    background: rgba(225, 29, 72, 0.08);
    box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.12), 0 0 0 2px rgba(255, 255, 255, 0.9) inset;
    pointer-events: none;
  }
  .source-highlight::after {
    content: "";
    position: absolute;
    left: 8px; right: 8px; bottom: 6px;
    border-bottom: 3px solid #e11d48;
  }
</style>
</head>
<body>
<header class="app-header">
  <h1>機電安全必携 学習クイズ</h1>
  <div class="sub">機械・電気の現場安全を 4 択で学ぶ業務用学習ツール</div>
</header>

<main>
  <!-- セットアップ画面 -->
  <section id="setup">
    <div class="card">
      <h2>出題設定</h2>
      <div class="filter-grid">
        <div class="field">
          <label for="f-level">難易度</label>
          <select id="f-level">
            <option value="all">すべて</option>
            <option value="初級">初級</option>
            <option value="中級">中級</option>
            <option value="上級">上級</option>
          </select>
        </div>
        <div class="field">
          <label for="f-count">問題数</label>
          <select id="f-count">
            <option value="10">10 問</option>
            <option value="20" selected>20 問</option>
            <option value="30">30 問</option>
            <option value="40">40 問</option>
            <option value="50">50 問</option>
            <option value="80">80 問</option>
            <option value="100">100 問</option>
            <option value="all">全問</option>
          </select>
        </div>
        <div class="field">
          <label for="f-mode">出題モード</label>
          <select id="f-mode">
            <option value="random">ランダム</option>
            <option value="category">カテゴリ順</option>
          </select>
        </div>
        <div class="field">
          <label for="f-exam-mode">試験モード</label>
          <select id="f-exam-mode">
            <option value="normal">通常</option>
            <option value="expert">超上級</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-start">学習を開始</button>
        <span class="hint" id="pool-info"></span>
      </div>
    </div>

    <div class="card">
      <h2>カテゴリ別ミニテスト（各 5 問）</h2>
      <p class="hint">カテゴリを選ぶと、そのカテゴリからランダムに 5 問出題します（5 問未満のカテゴリは全問）。</p>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </section>

  <!-- クイズ画面 -->
  <section id="quiz" class="hidden">
    <div class="card">
      <div class="quiz-header">
        <div class="progress-wrap">
          <div class="progress-bar"><span id="bar"></span></div>
          <div class="progress-meta">
            <span id="prog-text">1 / 20</span>
            <span id="mode-text"></span>
          </div>
        </div>
        <div class="score-pill" id="score-pill">スコア 0 / 0</div>
        <div class="score-pill exam-pill hidden" id="timer-pill">残り 00:00</div>
      </div>

      <div class="badges" id="badges"></div>
      <div class="question" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback hidden" id="feedback"></div>

      <div class="nav-row">
        <button class="btn btn-outline" id="btn-abort">中断して設定に戻る</button>
        <button class="btn btn-primary hidden" id="btn-next">次の問題へ</button>
      </div>
    </div>
  </section>

  <!-- 結果画面 -->
  <section id="result" class="hidden">
    <div class="card">
      <h2>結果サマリー</h2>
      <div class="result-grid">
        <div class="stat"><div class="num" id="r-correct">0</div><div class="label">正答数</div></div>
        <div class="stat"><div class="num" id="r-total">0</div><div class="label">出題数</div></div>
        <div class="stat"><div class="num" id="r-rate">0%</div><div class="label">正答率</div></div>
      </div>
      <div class="exam-result hidden" id="exam-result"></div>

      <h3>誤答が多いカテゴリ</h3>
      <table class="weak">
        <thead><tr><th>カテゴリ</th><th class="num">誤答</th><th class="num">出題</th><th class="num">正答率</th></tr></thead>
        <tbody id="weak-body"></tbody>
      </table>

      <div class="actions">
        <button class="btn btn-danger" id="btn-redo-wrong">誤答のみ再出題</button>
        <button class="btn btn-primary" id="btn-redo-same">同じ設定で再挑戦</button>
        <button class="btn btn-outline" id="btn-redo-config">設定を変えてやり直す</button>
      </div>

      <div class="review" id="review"></div>
    </div>
  </section>
</main>

<script>
/* =========================================================
  旧AI生成問題データ（非出題・退避用）
   各問題: { id, category, page, important, level, question, choices[4], answer(0..3), explanation }
  PDF本文準拠が確認できていないため、出題対象から外す。
   ========================================================= */
const LEGACY_AI_QUESTIONS = [
  /* --- 機電安全責任者の任務 (10) --- */
  {id:1, category:"機電安全責任者の任務", page:"P.1", important:true, level:"初級",
    question:"機電安全責任者の任務として「最も中核的」なものはどれか。",
    choices:[
      "機械・電気設備のリスクを把握し、災害防止対策を計画・推進する",
      "機械設備の生産能力向上計画を立案し、KPI を経営層へ報告する",
      "設備投資の予算配分について経営判断として最終決定する",
      "製品品質のばらつきを管理し、出荷可否を判定する"
    ],
    answer:0, explanation:"機電安全責任者の中核任務は機械・電気設備のリスク把握と災害防止対策の計画・推進。生産性、品質判定、予算決定は他の責任者の役割です。"},
  {id:2, category:"機電安全責任者の任務", page:"P.2", important:false, level:"初級",
    question:"日常業務として「適切でない」ものはどれか。",
    choices:[
      "巡視結果を記録し、是正措置の進捗を追跡する",
      "設備の異常傾向を点検記録から把握する",
      "設備の改造内容を記録に残さず口頭のみで指示する",
      "関係作業者へ KY ミーティングの実施を指導する"
    ],
    answer:2, explanation:"設備改造は変更管理の対象。記録と関係者への周知が必須で、口頭のみの指示は変更管理上不可です。"},
  {id:3, category:"機電安全責任者の任務", page:"P.1", important:true, level:"中級",
    question:"作業者への指導内容として「誤っている」ものはどれか。",
    choices:[
      "作業手順から外れる場合は事前に責任者の承認を得る",
      "保護具の選定はリスクに基づき責任者が指定し、勝手な代替を認めない",
      "異常時はまず停止・退避し、責任者へ報告する",
      "保護具の選定は現場の判断を優先し、作業者個人の好みに完全に委ねる"
    ],
    answer:3, explanation:"保護具はリスクアセスメント結果に基づき責任者が指定するもので、個人の好みに完全委任することは適切ではありません。"},
  {id:4, category:"機電安全責任者の任務", page:"P.60", important:false, level:"中級",
    question:"設備改造前のリスクアセスメントの基本手順として正しい順序はどれか。",
    choices:[
      "低減措置の決定 → 危険源の特定 → 評価 → 見積り",
      "危険源の特定 → リスクの見積り → 評価 → 低減措置の検討",
      "見積り → 危険源の特定 → 低減措置 → 評価",
      "評価 → 見積り → 低減措置 → 危険源の特定"
    ],
    answer:1, explanation:"ISO 12100 のリスクアセスメントは「危険源特定 → 見積り → 評価 → 低減措置」の順。"},
  {id:5, category:"機電安全責任者の任務", page:"P.86", important:true, level:"上級",
    question:"常時 50 人以上の事業場で、労働安全衛生法上「選任義務がない」ものはどれか。",
    choices:[
      "衛生管理者",
      "産業医",
      "安全管理者（一定業種）",
      "産業カウンセラー"
    ],
    answer:3, explanation:"50 人以上の事業場では衛生管理者・産業医、業種・規模により総括安全衛生管理者・安全管理者の選任が必要。産業カウンセラーは法定の選任ではありません。"},
  {id:6, category:"機電安全責任者の任務", page:"P.1", important:false, level:"中級",
    question:"異常発生時の初動として「最も適切」なものはどれか。",
    choices:[
      "原因が判明するまで運転を継続してデータを取得し、事後検証する",
      "即時停止し、関係者の退避と二次災害防止措置を講じたうえで報告する",
      "異常表示をリセットして再起動し、再現性の有無を確認する",
      "現場保存のみ行い、当該設備の責任者の出社を待ってから対応する"
    ],
    answer:1, explanation:"異常時は即時停止 → 退避 → 二次災害防止 → 報告が原則。継続運転による検証は被害拡大を招きます。"},
  {id:7, category:"機電安全責任者の任務", page:"P.109", important:false, level:"初級",
    question:"災害・ヒヤリハット記録の活用目的として「最も適切でない」ものはどれか。",
    choices:[
      "同種災害の再発防止策の検討",
      "他職場への水平展開と教訓共有",
      "設備改善の優先順位付け",
      "当事者の人事処分の根拠資料として最優先に使用する"
    ],
    answer:3, explanation:"記録は再発防止が主目的。処分根拠としての最優先利用は当事者の報告意欲を損ない、安全文化を毀損します。"},
  {id:8, category:"機電安全責任者の任務", page:"P.19", important:true, level:"中級",
    question:"構内請負作業に対する元方事業者の機電安全責任者の措置として「不適切」なものはどれか。",
    choices:[
      "危険有害情報を文書で周知する",
      "作業間の連絡調整を実施する",
      "請負業者の作業手順書作成に一切関与せず完全に任せる",
      "必要に応じ合同 KY を実施する"
    ],
    answer:2, explanation:"危険有害情報の周知や作業手順の整合性確認は元方の責務。完全な任せきりは混在災害の温床です。"},
  {id:9, category:"機電安全責任者の任務", page:"P.7", important:false, level:"上級",
    question:"教育訓練計画立案で考慮すべき要素として「該当しない」ものはどれか。",
    choices:[
      "雇入れ時・作業内容変更時の法定教育（安衛則 35 条）",
      "特別教育・技能講習等の有資格要件",
      "経験年数・職位に応じた段階的能力開発",
      "教育受講者の社内人気投票の結果"
    ],
    answer:3, explanation:"教育計画は法定要件と能力開発が軸。人気投票は教育計画の根拠になりません。"},
  {id:10, category:"機電安全責任者の任務", page:"P.1", important:false, level:"初級",
    question:"5S のうち「躾」の意味として最も適切なものはどれか。",
    choices:[
      "不要物を捨てる",
      "必要なものを取り出しやすく置く",
      "決められたルールを習慣として守る",
      "ゴミやほこりを取り除く"
    ],
    answer:2, explanation:"5S は整理・整頓・清掃・清潔・躾。躾は「ルールを習慣化する」こと。"},

  /* --- 機械作業計画・指示 (10) --- */
  {id:11, category:"機械作業計画・指示", page:"P.9", important:true, level:"初級",
    question:"機械作業計画書の必須記載事項に「含まれない」ものはどれか。",
    choices:[
      "作業手順と作業分担",
      "想定される危険要因と低減措置",
      "必要な保護具・安全装置",

    ],
    answer:3, explanation:"計画書は手順・危険要因・低減措置・保護具・分担等を記載。関係しない部署の名簿は必要ありません。"},
  {id:12, category:"機械作業計画・指示", page:"P.25", important:false, level:"初級",
    question:"指差呼称の効果として最も適切なものはどれか。",
    choices:[
      "視覚・聴覚・運動を連動させ、認知エラー率を低減する",
      "周囲に作業開始を音圧で警告する",
      "作業時間を短縮する目的で行う",
      "機械の運転音を抑制する"
    ],
    answer:0, explanation:"指差呼称はマルチモーダルな認知行動でエラー率を約 1/6 に低減するとされる手法です。"},
  {id:13, category:"機械作業計画・指示", page:"P.21", important:true, level:"中級",
    question:"非定常作業（清掃・修理・点検等）を計画する際に「最も優先」すべき事項はどれか。",
    choices:[
      "過去の同種非定常作業のトラブル事例と再発防止策の織り込み",
      "作業時間短縮のための工程の簡素化",
      "交代要員の人選と勤務シフト調整",
      "完了後の表彰準備"
    ],
    answer:0, explanation:"非定常作業は災害比率が高く、過去事例の教訓を計画に織り込むことが最重要です。"},
  {id:14, category:"機械作業計画・指示", page:"P.27", important:false, level:"中級",
    question:"KY ミーティングの実施方法として「不適切」なものはどれか。",
    choices:[
      "全員が発言できる少人数で実施する",
      "「現象 → 原因 → 対策 → 行動目標」の手順で進める",
      "危険ポイントの抽出は職長のみが行い、他は復唱だけする",
      "指差呼称項目を具体化して共有する"
    ],
    answer:2, explanation:"KY は全員参加で危険を抽出することに意味があります。職長単独抽出では気付きが偏ります。"},
  {id:15, category:"機械作業計画・指示", page:"P.27", important:true, level:"上級",
    question:"混在作業における作業間連絡調整について、元方事業者の「措置義務」に該当するものはどれか。",
    choices:[
      "関係請負人間の作業時間帯・作業区域の調整",
      "関係請負人の労働者への賃金支払",
      "関係請負人の従業員に対する全教育の代行実施",
      "関係請負人の労働契約の締結代行"
    ],
    answer:0, explanation:"安衛法 30 条に基づき、元方事業者は作業間連絡調整・区域や時間帯の調整等を行う義務があります。"},
  {id:16, category:"機械作業計画・指示", page:"P.27", important:false, level:"初級",
    question:"作業手順書に「最低限」記載すべき項目に該当しないものはどれか。",
    choices:[
      "作業の急所と理由",
      "使用工具・材料",
      "安全上の注意",
      "担当者の血液型と緊急連絡先の家族の趣味"
    ],
    answer:3, explanation:"手順書は急所・理由・工具・安全注意を記す。個人情報の家族の趣味は記載対象外です。"},
  {id:17, category:"機械作業計画・指示", page:"P.9", important:false, level:"中級",
    question:"作業計画変更時の対応として「最も適切」なものはどれか。",
    choices:[
      "関係者全員への周知＋影響範囲のリスク再評価＋手順書改訂",
      "担当職長への口頭連絡のみで足りる",
      "翌日の朝礼で報告すれば事後対応で問題ない",
      "変更内容が小規模なら記録は不要"
    ],
    answer:0, explanation:"計画変更は変更管理の対象。周知・リスク再評価・手順書改訂の三点が原則です。"},
  {id:18, category:"機械作業計画・指示", page:"P.47", important:true, level:"中級",
    question:"高さ 2m 以上で作業床を設けられない高所作業の措置として「最も適切」なものはどれか。",
    choices:[
      "フルハーネス型墜落制止用器具の使用と取付設備の整備",
      "経験者のみで実施し、器具は省略する",
      "短時間で終わるなら器具は不要",
      "胴ベルト型のみ可、フルハーネスは禁止"
    ],
    answer:0, explanation:"作業床が設けられない 2m 以上の場合は墜落制止用器具を使用し、取付設備の整備が必要です。胴ベルト型は原則 6.75m 以下の例外的使用に限定。"},
  {id:19, category:"機械作業計画・指示", page:"P.27", important:false, level:"上級",
    question:"作業指示者が「作業開始前」に確認すべき事項として、最も重要度が低いものはどれか。",
    choices:[
      "作業者の体調（睡眠・疲労・服薬の有無）",
      "保護具の装着状態",
      "危険源と緊急時退避経路",
      "作業者の自宅から会社までの通勤経路の混雑状況"
    ],
    answer:3, explanation:"作業前に確認すべきは作業安全に直接影響する要素。通勤路の混雑は作業安全に直結しません。"},
  {id:20, category:"機械作業計画・指示", page:"P.27", important:false, level:"初級",
    question:"作業計画書の保管に関する一般的扱いとして「最も適切」なものはどれか。",
    choices:[
      "完了後は速やかに破棄する",
      "社内規程に定める期間、トレーサビリティを確保して保管",
      "当該作業者の私物として個人保管させる",
      "法定外文書なので保管は不要"
    ],

  /* --- 作業開始前点検 (10) --- */
  {id:21, category:"作業開始前点検", page:"P.15", important:true, level:"初級",
    question:"作業開始前点検の目的として「最も適切」なものはどれか。",
    choices:[
      "異常の早期発見と災害の未然防止",
      "当日の出勤者数を把握するための名簿管理",
      "当日の生産目標を関係者へ周知するため",
      "残業発生の事前承認手続きのため"
    ],
    answer:0, explanation:"作業開始前点検は労安則上、異常の早期発見・是正による災害未然防止が目的です。"},
  {id:22, category:"作業開始前点検", page:"P.15", important:false, level:"初級",
    question:"点検で異常を確認した場合の対応として「最も適切」なものはどれか。",
    choices:[
      "当該設備の運転を停止し、表示・施錠のうえ責任者へ報告する",
      "異常箇所をテープで覆い、当日のみ運転する",
      "異音や振動を観察しながら運転を継続する",
      "翌日の点検時にあらためて確認する"
    ],
    answer:0, explanation:"異常時は運転停止 → 表示・施錠 → 報告・補修が原則。継続使用は被害拡大を招きます。"},
  {id:23, category:"作業開始前点検", page:"P.35", important:true, level:"中級",
    question:"フォークリフトの作業開始前点検項目（労安則 151 条の 25）に「含まれない」ものはどれか。",

      "タイヤの製造年月日の確認"
    ],
    answer:3, explanation:"労安則ではブレーキ・操縦・荷役・油圧装置、車輪の異常、前照灯・後照灯・方向指示器・警報装置の機能を点検。製造年月日確認は法定項目ではありません。"},
  {id:24, category:"作業開始前点検", page:"P.44", important:false, level:"中級",
    question:"クレーンの作業開始前点検（クレ等則 36 条）の項目として正しいものはどれか。",
    choices:[
      "巻過防止装置、ブレーキ、クラッチ、コントローラの機能、ランウェイの上の状態など",
      "安全弁の開放圧力の調整",
      "定格荷重の上方修正の確認",
      "主索の張力増加の調整"
    ],
    answer:0, explanation:"クレ等則 36 条では巻過防止装置・ブレーキ・クラッチ・コントローラの機能、ランウェイの上の状態等を点検します。"},
  {id:25, category:"作業開始前点検", page:"P.94", important:true, level:"上級",
    question:"動力プレス機械の作業開始前点検項目として「該当しない」ものはどれか。",
    choices:[
      "クラッチおよびブレーキの機能",
      "1 行程 1 停止機構・急停止機構・非常停止装置の機能",
      "安全装置の機能",
      "金型の生産ロット番号の照合"
    ],
    answer:3, explanation:"プレスの作業開始前点検はクラッチ・ブレーキ、1 行程 1 停止機構、安全装置等の機能確認。ロット番号照合は安全点検項目ではありません。"},
  {id:26, category:"作業開始前点検", page:"P.32", important:false, level:"初級",

    choices:[

      "個人別の PC ローカルへ保存し他者から見えなくする",
      "法定保存義務がないため随時破棄してよい",
      "異常時のみ記録し、正常時は記録しない"
    ],
    answer:0, explanation:"点検記録は改ざん防止と保存期間（多くは 3 年）の確保が原則。常時記録することで傾向管理が可能になります。"},
  {id:27, category:"作業開始前点検", page:"P.80", important:false, level:"中級",
    question:"研削盤の作業開始前点検として正しいものはどれか。",

  {id:28, category:"作業開始前点検", page:"P.70", important:false, level:"初級",

  {id:29, category:"作業開始前点検", page:"P.77", important:true, level:"中級",
    question:"移動式電動工具の使用前点検として「必須」なものはどれか。",

  {id:30, category:"作業開始前点検", page:"P.70", important:false, level:"上級",

    choices:[

      "酸素・アセチレン圧力調整器の指示確認",
      "ボンベを製造番号順に並べ替える"
    ],

  /* --- 作業関連連絡調整会議 (5) --- */

    choices:[

  {id:32, category:"作業関連連絡調整会議", page:"P.27", important:true, level:"中級",

    choices:[
      "元方事業者（発注者側）の機電安全責任者または統括安全衛生責任者",

  {id:33, category:"作業関連連絡調整会議", page:"P.27", important:false, level:"中級",

  {id:34, category:"作業関連連絡調整会議", page:"P.27", important:false, level:"初級",
    question:"作業関連連絡調整会議の開催頻度として「最も適切」なものはどれか。",

      "作業開始前および計画変更時、定期（例：毎日／週次）",

  {id:35, category:"作業関連連絡調整会議", page:"P.27", important:true, level:"上級",

    choices:[
      "議事録を全関係請負人と職長へ配布し、署名・確認を得る",
      "朝礼・KY 等の場で具体的に作業者へ伝達する",
      "掲示板への掲示と作業手順書への反映",
      "元方事業者の安全担当者のみが内容を把握しておく"
    ],
    answer:3, explanation:"元方の担当者だけが把握しても現場の作業者には伝わらず、混在災害の防止になりません。"},

  /* --- 届出・書類 (8) --- */
  {id:36, category:"届出・書類", page:"P.30", important:true, level:"中級",
    question:"労働安全衛生法に基づく機械等設置届の提出先と提出時期の組合せとして正しいものはどれか。",
    choices:[
      "所轄労働基準監督署長、工事開始の 30 日前まで",
      "所轄労働局長、工事完了後 30 日以内",
      "所轄消防長、工事開始前日まで",
      "厚生労働大臣、工事開始の 60 日前まで"
    ],
    answer:0, explanation:"安衛法 88 条 1 項に基づく機械等設置届は所轄労働基準監督署長に、工事開始の 30 日前までに提出します。"},
  {id:37, category:"届出・書類", page:"P.30", important:false, level:"中級",
    question:"労働安全衛生法に基づく計画届（機械等設置届）の対象に「該当しない」ものはどれか。",
    choices:[
      "吊上荷重 3t 以上のクレーン",
      "積載荷重 1t 以上のエレベーター",
      "小型ボイラーを除くボイラー",
      "汎用の卓上ボール盤"
    ],
    answer:3, explanation:"特定機械（クレーン、エレベーター、ボイラー等の所定規模以上）は計画届対象。汎用卓上ボール盤は対象外です。"},
  {id:38, category:"届出・書類", page:"P.109", important:true, level:"上級",
    question:"労働者死傷病報告の提出区分として正しい組合せはどれか。",
    choices:[
      "休業 4 日以上は遅滞なく、休業 1～3 日は四半期ごと取りまとめ",
      "休業 4 日以上は四半期ごと、休業 1～3 日は遅滞なく",
      "休業の有無に関わらず年 1 回まとめて提出",
      "死亡災害のみ提出義務がある"
    ],
    answer:0, explanation:"安衛則 97 条で、休業 4 日以上は遅滞なく（様式 23 号）、1～3 日は四半期ごと（様式 24 号）に取りまとめて提出します。"},
  {id:39, category:"届出・書類", page:"P.109", important:false, level:"中級",
    question:"労働者死傷病報告の提出対象に「該当しない」ものはどれか。",
    choices:[
      "業務上の負傷で休業 1 日となった災害",
      "業務上の腰痛で休業 4 日となった事案",
      "業務上の負傷で死亡した災害",
      "通勤途上の交通事故（業務上ではない）で休業 5 日となった事案"

    answer:3, explanation:"労働者死傷病報告は業務災害が対象。通勤災害（業務上ではないもの）はこの報告の対象外です。"},
  {id:40, category:"届出・書類", page:"P.91", important:false, level:"初級",
    question:"特定機械の検査証の交付者として「正しい」ものはどれか。",
    choices:[
      "所轄労働基準監督署長または登録製造時等検査機関",
      "都道府県知事",
      "経済産業大臣",
      "一般社団法人日本機械工業会"
    ],
    answer:0, explanation:"特定機械の検査証は所轄労働基準監督署長または登録製造時等検査機関が交付します。"},
  {id:41, category:"届出・書類", page:"P.32", important:false, level:"中級",
    question:"安全衛生関係記録の一般的な保存期間として「最も適切」なものはどれか。",
    choices:[
      "多くは 3 年。健康診断個人票や特殊健診結果等は 5 年以上のものもある",

      "法令上の規定はなく任意",
      "永久保存が義務付けられている"
    ],
    answer:0, explanation:"安全衛生関係記録は多くが 3 年保存。特殊健診の個人票等は 5 年（一部は 30 年・40 年）保存対象もあります。"},
  {id:42, category:"届出・書類", page:"P.26", important:true, level:"上級",
    question:"消防法に基づく危険物製造所等の設置許可申請の許可権者として「正しい」ものはどれか。",
    choices:[

      "経済産業大臣"
    ],
    answer:0, explanation:"消防法 11 条に基づき、危険物製造所等の設置許可は市町村長等が行います。"},
  {id:43, category:"届出・書類", page:"P.100", important:false, level:"初級",
    question:"作業主任者選任に関する事業者の措置として「不適切」なものはどれか。",
    choices:[
      "氏名およびその者に行わせる事項を作業場の見やすい箇所に掲示",
      "選任の事実を記録に残し、変更時は速やかに更新",
      "選任を変更したときは関係者に周知する",
      "当該作業主任者が休暇のときは無資格者に代行させる"
    ],
    answer:3, explanation:"作業主任者は技能講習修了者等から選任することが要件。無資格者による代行は法令違反です。"},

  /* --- 定期自主検査 (8) --- */
  {id:44, category:"定期自主検査", page:"P.97", important:true, level:"初級",
    question:"フォークリフトの年次定期自主検査（特定自主検査）の正しい組合せはどれか。",
    choices:[
      "1 年以内ごとに 1 回、有資格者または登録検査業者が実施",
      "2 年以内ごとに 1 回、運転者本人が実施",
      "5 年に 1 回、メーカーのみ可",
      "必要に応じて随時実施で足りる"
    ],
    answer:0, explanation:"フォークリフトの年次特定自主検査は 1 年以内ごとに 1 回、有資格者または登録検査業者により実施します。"},
  {id:45, category:"定期自主検査", page:"P.97", important:true, level:"中級",
    question:"フォークリフトの定期自主検査の周期について「誤り」はどれか。",
    choices:[
      "月例：1 月以内ごとに 1 回",
      "年次：1 年以内ごとに 1 回",
      "年次は特定自主検査で、有資格者または登録検査業者による",
      "月例は 6 月以内ごとに 1 回で足りる"
    ],
    answer:3, explanation:"フォークリフトの月例自主検査は 1 月以内ごとに 1 回。6 月では誤りです。"},
  {id:46, category:"定期自主検査", page:"P.97", important:false, level:"中級",
    question:"クレーン（吊上荷重 3t 以上）の検査と周期の組合せで「誤り」はどれか。",
    choices:[
      "年次自主検査：1 年以内ごとに 1 回",
      "月例自主検査：1 月以内ごとに 1 回",
      "性能検査：原則 2 年以内ごとに 1 回（労働基準監督署長等）",
      "作業開始前点検：3 月以内ごとに 1 回でよい"
    ],
    answer:3, explanation:"クレーンの作業開始前点検は「その日の作業を開始する前」に毎日実施します。"},
  {id:47, category:"定期自主検査", page:"P.97", important:false, level:"上級",
    question:"動力プレス機械の特定自主検査について「正しい」ものはどれか。",
    choices:[
      "1 年以内ごとに 1 回、有資格者（特定自主検査者）または登録検査業者が実施",
      "3 年以内ごとに 1 回でよい",
      "検査結果の標章貼付は任意",
      "操作者本人が独自基準で実施できる"
    ],
    answer:0, explanation:"動力プレスの特定自主検査は 1 年以内ごとに 1 回、有資格者または登録検査業者が実施し、検査標章を貼付します。"},
  {id:48, category:"定期自主検査", page:"P.97", important:true, level:"上級",
    question:"定期自主検査記録の保存期間として「正しい」ものはどれか。",
    choices:[
      "3 年間",
      "6 月",
      "10 年",
      "永久"
    ],
    answer:0, explanation:"労安則 151 条の 23 等で定期自主検査記録は 3 年間保存と定められています。"},
  {id:49, category:"定期自主検査", page:"P.97", important:false, level:"初級",
    question:"定期自主検査で異常を発見した場合の対応として「最も適切」なものはどれか。",
    choices:[
      "直ちに補修等の措置を行うまで使用しない",
      "次回検査時にまとめて補修する",
      "記録のみ残しそのまま使用する",
      "当該設備の責任者の判断のみで報告は省略する"
    ],
    answer:0, explanation:"異常があれば直ちに補修等の措置を講じ、それまで使用しないことが原則です。"},
  {id:50, category:"定期自主検査", page:"P.97", important:false, level:"中級",
    question:"ゴンドラの定期自主検査の周期として「正しい」組合せはどれか。",
    choices:[
      "月例：1 月以内ごとに 1 回／年次：1 年以内ごとに 1 回",
      "月例：3 月ごと／年次：3 年ごと",
      "年次のみ：2 年ごと",
      "検査義務なし"
    ],
    answer:0, explanation:"ゴンドラ安全規則では月例（1 月以内）と年次（1 年以内）の定期自主検査が義務付けられています。"},
  {id:51, category:"定期自主検査", page:"P.97", important:false, level:"中級",
    question:"局所排気装置・除じん装置・プッシュプル型換気装置の定期自主検査の周期として「正しい」ものはどれか。",
    choices:[
      "1 年以内ごとに 1 回",
      "6 月以内ごとに 1 回",
      "3 年以内ごとに 1 回",
      "5 年以内ごとに 1 回"
    ],
    answer:0, explanation:"局所排気装置等は 1 年以内ごとに 1 回の定期自主検査が義務付けられています（記録は 3 年保存）。"},

  /* --- 機械の管理ポイント (10) --- */
  {id:52, category:"機械の管理ポイント", page:"P.60", important:true, level:"初級",
    question:"機械安全における対策の優先順位として「最上位」となるものはどれか。",
    choices:[
      "本質的安全設計方策（危険源の除去・低減）",
      "安全防護および付加保護方策（ガード等）",
      "使用上の情報（警告ラベル・取扱説明書等）",
      "個人用保護具の使用"
    ],
    answer:0, explanation:"ISO 12100 の 3-step method では「本質安全 → 安全防護・付加保護 → 使用上の情報」の順。個人用保護具はさらにその次。"},
  {id:53, category:"機械の管理ポイント", page:"P.60", important:true, level:"中級",
    question:"「本質安全化」の例として「最も適切」なものはどれか。",
    choices:[
      "外部動力遮断時に自動的に安全側に作動する機構を採用する設計",
      "大きな警告ラベルを増貼する",
      "作業者に厚手の手袋を支給する",
      "KY シートのフォーマットを刷新する"
    ],
    answer:0, explanation:"本質安全化は危険源そのものの除去・低減や、フェールセーフ設計など、機械側の対策で行います。ラベル・保護具・帳票は本質安全ではありません。"},
  {id:54, category:"機械の管理ポイント", page:"P.60", important:false, level:"中級",
    question:"機械の保守時に LOTO（ロックアウト／タグアウト）を行う目的として「最も適切」なものはどれか。",
    choices:[
      "意図しない起動・通電や残圧開放等によるエネルギー再供給の防止",
      "作業時間の短縮",
      "工具のコスト削減",
      "周辺照明の節電"
    ],
    answer:0, explanation:"LOTO は機械の意図しない起動・通電や、ばね・気体・液体等の蓄積エネルギーの解放を防止する手順です。"},
  {id:55, category:"機械の管理ポイント", page:"P.60", important:true, level:"上級",
    question:"両手操作式安全装置の要件として「誤り」はどれか。",
    choices:[
      "両手のスイッチを同時操作（時間差 0.5 秒以内など）しないと起動しない",
      "操作中に片手を離すと急停止する",
      "操作位置から危険区域に手が届かない距離が確保されている",
      "片手で連続押下を維持できる機能（片手モード）を備えている"
    ],
    answer:3, explanation:"両手操作式は両手をスイッチに固定させることで危険区域に手を入れさせない装置。片手モードは安全意図に反します。"},
  {id:56, category:"機械の管理ポイント", page:"P.60", important:false, level:"初級",
    question:"プレス・裁断機等での挟まれ防止策のうち「最上位の対策」はどれか。",
    choices:[
      "危険源の除去（安全プレス化、機構的に手が入らない構造）",
      "安全囲い等の固定ガード",
      "光線式安全装置",
      "警告ステッカーの貼付"
    ],
    answer:0, explanation:"対策優先順位は本質安全 → 安全防護 → 使用上の情報。安全プレス化など機構的な除去が最上位です。"},
  {id:57, category:"機械の管理ポイント", page:"P.60", important:false, level:"中級",
    question:"回転体への巻き込まれ防止として「正しい」ものはどれか。",
    choices:[
      "回転部の覆い・囲いを設置し、ボール盤等では運転中は手袋を着用しない",
      "手袋着用を全機械で義務付ければ安全",
      "緩い袖の作業着で機械を扱う",
      "装身具は短いものなら付けてよい"
    ],
    answer:0, explanation:"ボール盤など回転刃物では手袋が巻き込まれの原因になるため運転中は外す。固定ガードと服装規律が基本です。"},
  {id:58, category:"機械の管理ポイント", page:"P.60", important:true, level:"中級",
    question:"プレス機械の安全装置として「該当しない」ものはどれか。",
    choices:[
      "両手操作式",
      "光線式（光電式）",
      "ガード式",
      "ベルトコンベヤ式"
    ],
    answer:3, explanation:"プレス安全装置には両手操作式、光線式、ガード式、手払い式、感応式等があります。ベルトコンベヤ式は搬送装置で安全装置ではありません。"},
  {id:59, category:"機械の管理ポイント", page:"P.60", important:false, level:"上級",
    question:"リスクアセスメントの「リスク見積り」の要素として「誤り」はどれか。",
    choices:[
      "危害のひどさ（重篤度）",
      "危険状態が発生する頻度・時間",
      "危険事象の発生確率（回避可能性を含む）",
      "当該機械の購入価格"
    ],
    answer:3, explanation:"リスクの見積りは重篤度・頻度・発生確率（回避可能性）で行い、価格は要素になりません。"},
  {id:60, category:"機械の管理ポイント", page:"P.60", important:false, level:"初級",
    question:"非常停止装置の要件として「誤り」はどれか。",
    choices:[
      "操作子は赤、背景は黄を推奨",
      "押した後は手動で復帰させなければ再起動できない",
      "機械全体・危険区域全体を停止できること",
      "押すだけで運転が自動的に再開する構造とする"
    ],
    answer:3, explanation:"非常停止後は手動で復帰させない限り再起動できない自己保持構造が必要。自動再起動は重大事故の原因となります。"},
  {id:61, category:"機械の管理ポイント", page:"P.30", important:false, level:"中級",
    question:"機械の据付時に確認すべき事項として「最も重要度が低い」ものはどれか。",
    choices:[
      "転倒防止・アンカー固定の確認",
      "保守スペース・通路幅の確保",
      "必要照度の確保",
      "据付業者の制服のデザイン"
    ],
    answer:3, explanation:"据付時の確認は安全と運用に関わる項目。業者の制服デザインは安全に関係しません。"},

  /* --- 事故・災害事例 (8) --- */
  {id:62, category:"事故・災害事例", page:"P.59", important:true, level:"初級",
    question:"プレス挟まれ災害の典型的な原因として「該当しない」ものはどれか。",
    choices:[
      "安全装置の無効化・短絡（バイパス配線）",
      "金型調整時に電源を遮断せず行った",
      "1 行程 1 停止機構の不具合",
      "周辺の換気装置の風量不足"
    ],
    answer:3, explanation:"プレスの挟まれ災害は安全装置の無効化・金型調整時の電源未遮断・1 行程 1 停止機構の不良が典型原因。換気不良は粉じん・化学物質の問題で、挟まれの原因ではありません。"},
  {id:63, category:"事故・災害事例", page:"P.59", important:false, level:"中級",
    question:"フォークリフトの死亡災害として「最も多い」類型はどれか。",
    choices:[
      "はさまれ・巻き込まれ／激突／墜落・転落／転倒",
      "給油時の感電",
      "静電気による発火",
      "ヘッドガード破損による落下物直撃のみ"
    ],
    answer:0, explanation:"フォークリフトの死亡災害ははさまれ・巻き込まれ、激突、墜落・転落、転倒が多くを占めます。"},
  {id:64, category:"事故・災害事例", page:"P.80", important:true, level:"中級",
    question:"研削といしの破裂事故の主な原因として「該当しない」ものはどれか。",
    choices:[
      "最高使用周速度の超過",
      "取付フランジの径不足や偏心",
      "試運転（取替時 3 分以上）の省略",
      "周囲温度が摂氏 20 度であったこと"
    ],
    answer:3, explanation:"といし破裂は速度超過、取付不良、試運転省略、亀裂のある旧品使用等が原因。常温室温は破裂原因ではありません。"},
  {id:65, category:"事故・災害事例", page:"P.57", important:false, level:"上級",
    question:"クレーンの吊り荷落下・激突災害の防止策として「最も不適切」なものはどれか。",
    choices:[
      "つり角度 60 度以下の確保と定格荷重順守",
      "玉掛け作業者を技能講習修了者から選任",
      "過巻防止装置・玉掛け用具の定期点検",
      "吊上時に荷の下を関係作業者が通行できるよう経路を整備"
    ],
    answer:3, explanation:"荷の下に人を立ち入らせることはクレ等則 74 条で原則禁止。落下時に直撃を受けるためです。"},
  {id:66, category:"事故・災害事例", page:"P.70", important:false, level:"中級",
    question:"アーク溶接作業に伴う代表的災害として「該当しない」ものはどれか。",
    choices:[
      "感電",
      "アーク光による電気性眼炎",
      "ヒュームによる金属熱・じん肺",
      "凍傷"
    ],
    answer:3, explanation:"アーク溶接の代表的災害は感電・眼障害・火災・ヒューム障害等。凍傷は寒冷曝露の災害で、アーク溶接の典型災害ではありません。"},
  {id:67, category:"事故・災害事例", page:"P.47", important:true, level:"初級",

  {id:68, category:"事故・災害事例", page:"P.55", important:false, level:"中級",

  {id:69, category:"事故・災害事例", page:"P.55", important:false, level:"上級",

  {id:71, category:"電気の管理ポイント", page:"P.86", important:true, level:"中級",

  {id:72, category:"電気の管理ポイント", page:"P.84", important:false, level:"中級",

      "施錠 → 短絡接地 → 開閉器の開放 → 検電",
      "短絡接地 → 検電 → 開閉器の開放 → 施錠"
    ],
    answer:0, explanation:"停電作業は「開閉器開放 → 検電 → 短絡接地 → 施錠・表示」の順。逆や省略は誤通電による感電につながります。"},
  {id:73, category:"電気の管理ポイント", page:"P.63", important:true, level:"上級",

  {id:74, category:"電気の管理ポイント", page:"P.63", important:false, level:"中級",

  {id:75, category:"電気の管理ポイント", page:"P.63", important:false, level:"初級",

  {id:76, category:"電気の管理ポイント", page:"P.63", important:true, level:"上級",

  {id:77, category:"電気の管理ポイント", page:"P.97", important:false, level:"中級",

  {id:78, category:"電気の管理ポイント", page:"P.63", important:false, level:"初級",
    question:"電気火災の主因として「適切でない」ものはどれか。",

    ],
    answer:3, explanation:"正しい容量のブレーカ使用は火災防止策。火災主因はトラッキング・過電流・短絡・接触不良（過熱）などです。"},
  {id:79, category:"電気の管理ポイント", page:"P.61", important:false, level:"中級",

    ],
    answer:3, explanation:"電気室は関係者以外の立入禁止・施錠が原則。扉の常時開放は感電・いたずら・短絡事故の原因になります。"},

  /* --- 電気安全十則 (10) --- */
  {id:80, category:"電気安全十則", page:"P.63", important:true, level:"初級",
    question:"電気の特性に関する記述として「適切でない」ものはどれか。",
    choices:[
      "電気は目に見えず匂いもないため、五感での認知が困難",

      "低圧であれば感電死は絶対に起こらない"
    ],
    answer:3, explanation:"低圧（特に 100V）でも電流経路と時間によっては心室細動を起こし得ます。「低圧＝安全」は誤りです。"},
  {id:81, category:"電気安全十則", page:"P.84", important:false, level:"初級",
    question:"電気取扱の原則として「誤り」はどれか。",
    choices:[

      "緊急時のみは無資格者も操作してよい"
    ],
    answer:3, explanation:"緊急であっても無資格者の電気取扱は禁止。誤操作による二次災害の危険が高まります。"},
  {id:82, category:"電気安全十則", page:"P.84", important:true, level:"中級",
    question:"停電作業時に「省略してはならない」措置の組合せはどれか。",

    ],
    answer:0, explanation:"停電作業の安全 4 点セット（検電・短絡接地・施錠・表示）は省略不可。一つでも欠けると誤通電災害につながります。"},
  {id:83, category:"電気安全十則", page:"P.84", important:false, level:"中級",
    question:"活線作業時の措置として「不適切」なものはどれか。",

  {id:84, category:"電気安全十則", page:"P.84", important:false, level:"初級",

  {id:85, category:"電気安全十則", page:"P.77", important:true, level:"中級",

  {id:86, category:"電気安全十則", page:"P.63", important:false, level:"中級",

  {id:87, category:"電気安全十則", page:"P.63", important:false, level:"上級",

  {id:88, category:"電気安全十則", page:"P.61", important:false, level:"初級",

  return a;
}

// 選択肢順を毎回ランダム化し、正解位置からの推測を不可能にする
function withShuffledChoices(q) {
  const indices = shuffle([0, 1, 2, 3]);
  const newChoices = indices.map(i => q.choices[i]);
  const newAnswer = indices.indexOf(q.answer);
  return { ...q, choices: newChoices, answer: newAnswer };
}

function prepareQuestions(arr) {
  return arr.map(withShuffledChoices);
}

function listCategories() {
  const seen = new Map();
  for (const q of QUESTIONS) {
    seen.set(q.category, (seen.get(q.category) || 0) + 1);
  }
  return Array.from(seen.entries()); // [name, count]
}

const EXPERT_PASS_RATE = 90;
const EXPERT_SECONDS_PER_QUESTION = 45;
const EXPERT_MIN_SECONDS = 300;
const EXPERT_KEYWORDS = [
  "資格", "点検", "検査", "検定", "届出", "報告", "選任", "禁止", "中止", "異常",
  "漏電", "感電", "接地", "ELB", "遮断", "規制", "法令", "別表", "主任者",
  "指揮者", "監視人", "誘導者", "立入禁止", "暴風", "大雨", "強風", "定期"
];

function isExpertConfig(cfg) {
  return cfg && cfg.examMode === "expert";
}

function isExpertQuestion(q) {
  if (q.level === "超上級" || q.level === "上級" || q.important) return true;
  const text = `${q.category} ${q.question} ${q.explanation}`;
  return q.level === "中級" && EXPERT_KEYWORDS.some(word => text.includes(word));
}

function buildPool(cfg) {
  let base = QUESTIONS.slice();
  if (isExpertConfig(cfg)) {
    base = base.filter(isExpertQuestion);
  } else if (cfg.level && cfg.level !== "all") {
    base = base.filter(q => q.level === cfg.level);
  }
  let ordered;
  if (cfg.mode === "category") {
    const byCat = new Map();
    for (const q of base) {
      if (!byCat.has(q.category)) byCat.set(q.category, []);
      byCat.get(q.category).push(q);
    }
    ordered = [];
    for (const [, arr] of byCat) {
      for (const q of shuffle(arr)) ordered.push(q);
    }
  } else {
    ordered = shuffle(base);
  }
  let n;
  if (cfg.count === "all") n = ordered.length;
  else {
    n = parseInt(cfg.count, 10);
    if (!Number.isFinite(n) || n <= 0) n = ordered.length;
  }
  return ordered.slice(0, Math.min(n, ordered.length));
}

function updatePoolInfo() {
  const cfg = readSetupConfig();
  const pool = buildPool(cfg);
  const label = isExpertConfig(cfg) ? "超上級出題予定" : "出題予定";
  $("#pool-info").textContent = `${label}：${pool.length} 問（総問題数 ${QUESTIONS.length}）`;
}

function readSetupConfig() {
  return {
    level: $("#f-level").value,
    count: $("#f-count").value,
    mode: $("#f-mode").value,
    examMode: $("#f-exam-mode").value,
    source: "setup",
  };
}

function stopExamTimer() {
  if (state.timerId) clearInterval(state.timerId);
  state.timerId = null;
}

function formatTime(seconds) {
  const safe = Math.max(0, seconds);
  const m = Math.floor(safe / 60);
  const s = safe % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function updateTimerPill() {
  const pill = $("#timer-pill");
  if (!isExpertConfig(state.config)) {
    pill.classList.add("hidden");
    return;
  }
  pill.classList.remove("hidden");
  pill.textContent = `残り ${formatTime(state.remainingSeconds)}`;
}

function startExamTimer() {
  stopExamTimer();
  state.timedOut = false;
  if (!isExpertConfig(state.config)) {
    state.remainingSeconds = 0;
    updateTimerPill();
    return;
  }
  state.remainingSeconds = Math.max(EXPERT_MIN_SECONDS, state.pool.length * EXPERT_SECONDS_PER_QUESTION);
  updateTimerPill();
  state.timerId = setInterval(() => {
    state.remainingSeconds -= 1;
    updateTimerPill();
    if (state.remainingSeconds <= 0) {
      state.timedOut = true;
      finishQuiz();
    }
  }, 1000);
}

function fillUnansweredAsWrong() {
  for (let i = state.answers.length; i < state.pool.length; i++) {
    state.answers.push({ q: state.pool[i], picked: -1, correct: false, timedOut: state.timedOut });
  }
}

/* =========================================================
   画面表示
   ========================================================= */
function showSetup() {
  stopExamTimer();
  setupEl.classList.remove("hidden");
  quizEl.classList.add("hidden");
  resultEl.classList.add("hidden");
  updateTimerPill();
  updatePoolInfo();
}

function showQuiz() {
  setupEl.classList.add("hidden");
  quizEl.classList.remove("hidden");
  resultEl.classList.add("hidden");
}

function showResult() {
  stopExamTimer();
  setupEl.classList.add("hidden");
  quizEl.classList.add("hidden");
  resultEl.classList.remove("hidden");
  updateTimerPill();
}

/* =========================================================
   カテゴリミニテスト
   ========================================================= */
function renderCategoryButtons() {
  const grid = $("#cat-grid");
  grid.innerHTML = "";
  for (const [name, count] of listCategories()) {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerHTML = `<span class="cat-name">${name}</span><span class="cat-meta">登録 ${count} 問 / 出題 ${Math.min(5, count)} 問</span>`;
    btn.addEventListener("click", () => startCategoryMini(name));
    grid.appendChild(btn);
  }
}

function startCategoryMini(category) {
  const items = QUESTIONS.filter(q => q.category === category);
  const pool = shuffle(items).slice(0, Math.min(5, items.length));
  state.config = { level: "all", count: String(pool.length), mode: "random", source: "category", category };
  state.pool = prepareQuestions(pool);
  state.index = 0;
  state.answers = [];
  state.answered = false;
  state.timedOut = false;
  stopExamTimer();
  showQuiz();
  renderQuestion();
}

/* =========================================================
   クイズ進行
   ========================================================= */
function startQuiz() {
  const cfg = readSetupConfig();
  const pool = buildPool(cfg);
  if (pool.length === 0) {
    alert("条件に合致する問題がありません。フィルターを変更してください。");
    return;
  }
  state.config = cfg;
  state.pool = prepareQuestions(pool);
  state.index = 0;
  state.answers = [];
  state.answered = false;
  state.timedOut = false;
  showQuiz();
  startExamTimer();
  renderQuestion();
}

function renderQuestion() {
  state.answered = false;
  const q = state.pool[state.index];
  const total = state.pool.length;
  const cur = state.index + 1;

  $("#bar").style.width = `${((cur - 1) / total) * 100}%`;
  $("#prog-text").textContent = `${cur} / ${total}`;
  const modeLabel =
    state.config.source === "category" ? `カテゴリミニテスト：${state.config.category}` :
    state.config.source === "wrong" ? "誤答のみ再出題" :
    `${state.config.mode === "category" ? "カテゴリ順" : "ランダム"} / 難易度 ${state.config.level === "all" ? "すべて" : state.config.level}${isExpertConfig(state.config) ? " / 超上級" : ""}`;
  $("#mode-text").textContent = modeLabel;

  updateScorePill();

  const badges = $("#badges");
  badges.innerHTML = "";
  badges.appendChild(makeBadge(q.category, "cat"));
  badges.appendChild(makeBadge(q.level, "level-" + q.level));
  if (q.important) badges.appendChild(makeBadge("重要", "important"));

  $("#q-text").textContent = `Q${cur}. ${q.question}`;

  const choicesEl = $("#choices");
  choicesEl.innerHTML = "";
  const letters = ["A", "B", "C", "D"];
  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<span class="idx">${letters[i]}</span><span>${c}</span>`;
    btn.addEventListener("click", () => onChoose(i));
    choicesEl.appendChild(btn);
  });

  const fb = $("#feedback");
  fb.classList.add("hidden");
  fb.classList.remove("ok", "ng");
  fb.innerHTML = "";
  $("#btn-next").classList.add("hidden");
}

function makeBadge(text, cls) {
  const span = document.createElement("span");
  span.className = "badge " + cls;
  span.textContent = text;
  return span;
}

function makePageBadge(q) {
  const ref = getPageRef(q);
  if (!ref) return null;
  if (!ref.clickable) return makeBadge(ref.label, `page ${ref.kind}`);
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = `badge page ${ref.kind} clickable`;
  btn.textContent = ref.label;
  btn.title = `機電安全必携の該当箇所 P.${ref.page} を開く`;
  btn.addEventListener("click", () => window.openQuestionSource(q));
  return btn;
}

function appendFeedbackSourceLink(container, q) {
  const pageBadge = makePageBadge(q);
  if (!pageBadge) return;
  const wrap = document.createElement("div");
  wrap.className = "feedback-source";
  const label = document.createElement("span");
  label.className = "feedback-source-label";
  label.textContent = "本文確認：";
  wrap.appendChild(label);
  wrap.appendChild(pageBadge);
  container.appendChild(wrap);
}

function onChoose(picked) {
  if (state.answered) return;
  state.answered = true;
  const q = state.pool[state.index];
  const correct = picked === q.answer;
  state.answers.push({ q, picked, correct });

  const buttons = $("#choices").querySelectorAll(".choice");
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (isExpertConfig(state.config)) {
      if (i === picked) b.classList.add("selected");
    } else {
      if (i === q.answer) b.classList.add("correct");
      if (i === picked && !correct) b.classList.add("wrong");
    }
  });

  const fb = $("#feedback");
  fb.classList.remove("hidden", "ok", "ng");
  if (isExpertConfig(state.config)) {
    fb.innerHTML = `<div><span class="label">解答記録</span>結果と解説は終了後に表示します。</div>`;
  } else {
    fb.classList.add(correct ? "ok" : "ng");
    fb.innerHTML = `
      <div><span class="label">${correct ? "正解！" : "不正解"}</span>正解：${["A","B","C","D"][q.answer]}. ${escapeHtml(q.choices[q.answer])}</div>
      <div class="explain"><strong>解説：</strong>${escapeHtml(q.explanation)}</div>
    `;
    appendFeedbackSourceLink(fb, q);
  }
  $("#btn-next").classList.remove("hidden");
  $("#btn-next").textContent = state.index + 1 >= state.pool.length ? "結果を見る" : "次の問題へ";
  updateScorePill();
}

function onNext() {
  if (state.index + 1 >= state.pool.length) {
    finishQuiz();
    return;
  }
  state.index++;
  renderQuestion();
}

function updateScorePill() {
  const total = state.pool.length;
  const correct = state.answers.filter(a => a.correct).length;
  if (isExpertConfig(state.config)) {
    $("#score-pill").textContent = `解答済 ${state.answers.length} / ${total}`;
  } else {
    $("#score-pill").textContent = `スコア ${correct} / ${total}`;
  }
}

/* =========================================================
   結果
   ========================================================= */
function finishQuiz() {
  stopExamTimer();
  if (isExpertConfig(state.config)) fillUnansweredAsWrong();
  const total = isExpertConfig(state.config) ? state.pool.length : state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const rate = total === 0 ? 0 : Math.round((correct / total) * 1000) / 10;

  $("#r-correct").textContent = correct;
  $("#r-total").textContent = total;
  $("#r-rate").textContent = rate + "%";

  const examResult = $("#exam-result");
  if (isExpertConfig(state.config)) {
    const passed = rate >= EXPERT_PASS_RATE;
    examResult.classList.remove("hidden", "ok", "ng");
    examResult.classList.add(passed ? "ok" : "ng");
    examResult.textContent = `${state.timedOut ? "時間切れ / " : ""}超上級判定：${passed ? "合格" : "未達"}（合格ライン ${EXPERT_PASS_RATE}%）`;
  } else {
    examResult.classList.add("hidden");
    examResult.classList.remove("ok", "ng");
    examResult.textContent = "";
  }

  // 誤答が多いカテゴリ
  const byCat = new Map();
  for (const a of state.answers) {
    const cat = a.q.category;
    if (!byCat.has(cat)) byCat.set(cat, { total: 0, wrong: 0 });
    const o = byCat.get(cat);
    o.total++;
    if (!a.correct) o.wrong++;
  }
  const rows = Array.from(byCat.entries())
    .map(([cat, o]) => ({ cat, total: o.total, wrong: o.wrong, rate: o.total ? Math.round((o.total - o.wrong) / o.total * 100) : 0 }))
    .filter(r => r.wrong > 0)
    .sort((a, b) => b.wrong - a.wrong || a.rate - b.rate)
    .slice(0, 5);

  const tbody = $("#weak-body");
  tbody.innerHTML = "";
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="center">誤答はありません。素晴らしいです。</td></tr>`;
  } else {
    for (const r of rows) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${escapeHtml(r.cat)}</td><td class="num">${r.wrong}</td><td class="num">${r.total}</td><td class="num">${r.rate}%</td>`;
      tbody.appendChild(tr);
    }
  }

  // 全問レビュー
  const review = $("#review");
  review.innerHTML = "<h3>解答レビュー</h3>";
  state.answers.forEach((a, i) => {
    const letters = ["A","B","C","D"];
    const item = document.createElement("div");
    item.className = "review-item";
    const ref = getPageRef(a.q);
    const pageHtml = !ref ? "根拠ページ未設定" : ref.clickable
      ? `<button type="button" class="page-link" data-page="${ref.page}" data-question-id="${a.q.id}">${escapeHtml(ref.label)}</button>`
      : `<span class="page-ref-reference">${escapeHtml(ref.label)}</span>`;
    item.innerHTML = `
      <div class="q">Q${i+1}. ${escapeHtml(a.q.question)}</div>
      <div class="meta">${escapeHtml(a.q.category)} / ${pageHtml} / ${escapeHtml(a.q.level)}${a.q.important ? " / 重要" : ""}</div>
      <div class="a-line">
        あなたの解答：<span class="${a.correct ? "ok" : "ng"}">${a.picked >= 0 ? `${letters[a.picked]}. ${escapeHtml(a.q.choices[a.picked])}` : "未回答"}</span>
        ／ 正解：<span class="ok">${letters[a.q.answer]}. ${escapeHtml(a.q.choices[a.q.answer])}</span>
      </div>
      <div class="a-line"><strong>解説：</strong>${escapeHtml(a.q.explanation)}</div>
    `;
    review.appendChild(item);
  });
  review.querySelectorAll(".page-link[data-page]").forEach((el) => {
    el.addEventListener("click", () => {
      const q = QUESTIONS.find(item => String(item.id) === el.dataset.questionId);
      window.openQuestionSource(q || el.dataset.page);
    });
  });

  showResult();
}

function redoWrong() {
  const wrong = state.answers.filter(a => !a.correct).map(a => a.q);
  if (wrong.length === 0) {
    alert("誤答がありません。お疲れさまでした。");
    return;
  }
  state.pool = prepareQuestions(shuffle(wrong));
  state.index = 0;
  state.answers = [];
  state.answered = false;
  state.config = { ...state.config, source: "wrong" };
  showQuiz();
  startExamTimer();
  renderQuestion();
}

function redoSame() {
  if (!state.config) return;
  if (state.config.source === "category") {
    startCategoryMini(state.config.category);
    return;
  }
  const pool = buildPool(state.config);
  if (pool.length === 0) {
    alert("条件に合致する問題がありません。");
    return;
  }
  state.pool = prepareQuestions(pool);
  state.index = 0;
  state.answers = [];
  state.answered = false;
  showQuiz();
  startExamTimer();
  renderQuestion();
}

function redoConfig() {
  showSetup();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

/* =========================================================
   初期化
   ========================================================= */
document.addEventListener("DOMContentLoaded", () => {
  renderCategoryButtons();
  updatePoolInfo();
  $("#f-level").addEventListener("change", updatePoolInfo);
  $("#f-count").addEventListener("change", updatePoolInfo);
  $("#f-mode").addEventListener("change", updatePoolInfo);
  $("#f-exam-mode").addEventListener("change", updatePoolInfo);

  $("#btn-start").addEventListener("click", startQuiz);
  $("#btn-next").addEventListener("click", onNext);
  $("#btn-abort").addEventListener("click", () => {
    if (confirm("中断して設定画面に戻りますか？")) showSetup();
  });
  $("#btn-redo-wrong").addEventListener("click", redoWrong);
  $("#btn-redo-same").addEventListener("click", redoSame);
  $("#btn-redo-config").addEventListener("click", redoConfig);
});

    105:{rects:[{x:6,y:7,w:88,h:82}]},
    106:{rects:[{x:6,y:7,w:88,h:82}]},
    107:{rects:[{x:6,y:7,w:88,h:82}]},
    108:{rects:[{x:6,y:7,w:88,h:82}]},
    109:{rects:[{x:6,y:7,w:88,h:82}]},
    110:{rects:[{x:6,y:7,w:88,h:86}]},
  };
  const modal = document.getElementById("pdf-modal");
  const frame = document.getElementById("pdf-modal-frame");
  const sourceViewer = document.getElementById("pdf-source-viewer");
  const sourcePage = document.getElementById("pdf-source-page");
  const sourceImage = document.getElementById("pdf-source-image");
  const sourceHighlights = document.getElementById("pdf-source-highlights");
  const title = document.getElementById("pdf-modal-title");
  const newtab = document.getElementById("pdf-open-newtab");
  const closeBtn = document.getElementById("pdf-modal-close");

  function pdfPageNumber(page) {
    const mapping = PDF_PAGE_OFFSETS.find(item => page >= item.from);
    const offset = mapping ? mapping.offset : 5;
    return page + offset;
  }

  function pad3(n) {
    return String(n).padStart(3, "0");
  }

  function buildUrl(page) {
    const base = encodeURI(PDF_FILE);
    return `${base}#page=${pdfPageNumber(page)}&zoom=page-fit`;
  }

  function buildImageUrl(page) {
    return `source_pages/paper_${pad3(page)}_pdf_${pad3(pdfPageNumber(page))}.png`;
  }

  function showPdf(url) {
    sourceViewer.classList.add("hidden");
    sourceImage.removeAttribute("src");
    sourceHighlights.innerHTML = "";
    frame.classList.remove("hidden");
    frame.src = url;
  }

  function drawHighlights(highlight) {
    sourceHighlights.innerHTML = "";
    const rects = Array.isArray(highlight && highlight.rects) ? highlight.rects : [];
    for (const rect of rects) {
      const el = document.createElement("div");
      el.className = "source-highlight";
      el.style.left = `${rect.x}%`;
      el.style.top = `${rect.y}%`;
      el.style.width = `${rect.w}%`;
      el.style.height = `${rect.h}%`;
      sourceHighlights.appendChild(el);
    }
    return rects;
  }

  function showSourceImage(page, pdfUrl, highlight) {
    frame.classList.add("hidden");
    frame.src = "about:blank";
    sourceViewer.classList.remove("hidden");
    const rects = drawHighlights(highlight);
    sourceImage.onerror = () => showPdf(pdfUrl);
    sourceImage.onload = () => {
      const first = rects[0];
      if (!first) return;
      requestAnimationFrame(() => {
        const targetTop = sourcePage.clientHeight * (first.y / 100);
        sourceViewer.scrollTop = Math.max(0, targetTop - sourceViewer.clientHeight * 0.25);
      });
    };
    sourceImage.src = buildImageUrl(page);
  }

  window.openPdfPage = function (page, question) {
    const n = parseInt(String(page).replace(/[^0-9]/g, ""), 10);
    if (!n || n < 1) return;
    const url = buildUrl(n);
    newtab.href = url;
    title.textContent = `機電安全必携 — P.${n}`;
    const highlight = question && (
      SOURCE_HIGHLIGHTS[question.id] || SOURCE_PAGE_HIGHLIGHTS[Number(question.sourcePage)]
    );
    if (highlight) showSourceImage(n, url, highlight);
    else showPdf(url);
    modal.classList.remove("hidden");
    document.body.style.overflow = "hidden";
  };

  window.openQuestionSource = function (questionOrPage) {
    if (typeof questionOrPage === "object" && questionOrPage) {
      const ref = getPageRef(questionOrPage);
      if (ref) window.openPdfPage(ref.page, questionOrPage);
      return;
    }
    window.openPdfPage(questionOrPage);
  };

  function closeModal() {
    modal.classList.add("hidden");
    frame.src = "about:blank";
    sourceImage.removeAttribute("src");
    sourceHighlights.innerHTML = "";
    document.body.style.overflow = "";
  }

  closeBtn.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !modal.classList.contains("hidden")) closeModal();
  });
})();
</script>
</body>
</html>
